name: Trigger auto deployment for bananay

# When this action will be executed
on:
  # Automatically trigger it when detected changes in repo
  push:
    branches: 
      [ main ]
    paths:
    - '**'
    - '.github/workflows/bananay-AutoDeployTrigger-2f63640c-8d1b-4908-ac3d-c215fdb964df.yml'

  # Allow manual trigger 
  workflow_dispatch:      

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    permissions: 
      id-token: write #This is required for requesting the OIDC JWT Token
      contents: read #Required when GH token is used to authenticate with private repo

    steps:
      - name: Checkout to the branch
        uses: actions/checkout@v2

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.BANANAY_AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.BANANAY_AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.BANANAY_AZURE_SUBSCRIPTION_ID }}

      - name: Build and push container image to registry
        uses: azure/container-apps-deploy-action@v2
        with:
          appSourcePath: ${{ github.workspace }}
          _dockerfilePathKey_: _dockerfilePath_
          _targetLabelKey_: _targetLabel_
          registryUrl: bananay.azurecr.io
          registryUsername: ${{ secrets.BANANAY_REGISTRY_USERNAME }}
          registryPassword: ${{ secrets.BANANAY_REGISTRY_PASSWORD }}
          containerAppName: bananay
          resourceGroup: Bananay
          imageToBuild: bananay.azurecr.io/bananay:${{ github.sha }}
          _buildArgumentsKey_: |
            _buildArgumentsValues_


